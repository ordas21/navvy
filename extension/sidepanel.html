<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Browser Agent</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div id="header">
      <div id="header-title">Claude Browser Agent</div>
      <div id="status-indicator">
        <span id="status-dot"></span>
        <span id="status-text">Disconnected</span>
      </div>
    </div>

    <!-- Messages area -->
    <div id="messages"></div>

    <!-- Input area -->
    <div id="input-area">
      <div id="attachments-bar"></div>
      <div id="input-row">
        <button id="btn-attach" title="Attach file">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
          </svg>
        </button>
        <button id="btn-page" title="Attach current page context">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18"/>
          </svg>
        </button>
        <textarea id="prompt-input" placeholder="What should I do in the browser?" rows="1"></textarea>
        <button id="btn-send" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
        <button id="btn-cancel" title="Cancel" style="display:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9l6 6m0-6l-6 6"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Settings overlay -->
    <div id="settings-overlay" style="display:none">
      <div id="settings-panel">
        <h3>Settings</h3>
        <label>Server URL
          <input type="text" id="setting-server-url" value="ws://localhost:3300/ws">
        </label>
        <div id="settings-actions">
          <button id="btn-settings-save">Save</button>
          <button id="btn-settings-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
