<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navvy</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div id="header">
      <div id="header-left">
        <img src="icons/icon16.png" width="16" height="16" alt="Navvy" style="opacity:0.9">
        <span id="header-title">Navvy</span>
      </div>
      <div id="header-right">
        <button id="btn-conversations" class="icon-btn" title="Conversations">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </button>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
        </button>
        <div id="status-indicator">
          <span id="status-dot"></span>
          <span id="status-text">Disconnected</span>
        </div>
      </div>
    </div>

    <!-- Mode bar -->
    <div id="mode-bar">
      <div id="mode-chips">
        <button class="mode-chip active" data-mode="auto">Auto</button>
        <button class="mode-chip" data-mode="screenshot">Screenshot</button>
        <button class="mode-chip" data-mode="dom">&lt;/&gt; DOM</button>
        <button class="mode-chip" data-mode="accessibility">A11y</button>
        <button class="mode-chip" data-mode="network">Network</button>
        <button class="mode-chip" data-mode="console">Console</button>
      </div>
    </div>

    <!-- Messages area -->
    <div id="messages">
      <div class="welcome">
        <div class="welcome-title">Navvy</div>
        <div class="welcome-sub">I can see and interact with web pages. Tell me what to do.</div>
        <div class="welcome-examples"></div>
      </div>
    </div>

    <!-- Input area -->
    <div id="input-area">
      <div id="attachments-bar"></div>
      <div id="input-container">
        <textarea id="prompt-input" placeholder="Tell me what to do..." rows="1"></textarea>
        <div id="input-actions">
          <button id="btn-attach" title="Attach file" class="icon-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <button id="btn-page" title="Attach current page" class="icon-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/>
            </svg>
          </button>
          <button id="btn-send" title="Send" class="send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14"/><path d="M12 5l7 7-7 7"/>
            </svg>
          </button>
          <button id="btn-cancel" title="Cancel" class="cancel-btn" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9l6 6m0-6l-6 6"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Conversations overlay -->
    <div id="conversations-overlay" style="display:none">
      <div id="conversations-panel">
        <div id="conversations-header">
          <h3>Conversations</h3>
          <div id="conversations-header-actions">
            <button id="btn-new-conversation" title="New Conversation">+ New</button>
            <button id="btn-conversations-close" class="icon-btn" title="Close">&times;</button>
          </div>
        </div>
        <div id="conversations-list"></div>
      </div>
    </div>

    <!-- Slash command popup -->
    <div id="slash-popup" style="display:none">
      <div id="slash-popup-list"></div>
    </div>

    <!-- Approval dialog overlay -->
    <div id="approval-overlay" style="display:none">
      <div id="approval-panel">
        <div id="approval-header">
          <span id="approval-badge" class="trust-badge">DANGEROUS</span>
          <h3>Approval Required</h3>
        </div>
        <div id="approval-body">
          <div id="approval-tool" class="approval-field">
            <label>Tool</label>
            <span id="approval-tool-name"></span>
          </div>
          <div id="approval-reason-field" class="approval-field">
            <label>Reason</label>
            <span id="approval-reason"></span>
          </div>
          <div id="approval-input-field" class="approval-field">
            <label>Details</label>
            <pre id="approval-input"></pre>
          </div>
        </div>
        <div id="approval-actions">
          <button id="btn-approval-deny" class="approval-btn deny">Deny</button>
          <button id="btn-approval-approve" class="approval-btn approve">Approve</button>
          <button id="btn-approval-always" class="approval-btn always">Always Allow</button>
        </div>
      </div>
    </div>

    <!-- Settings overlay -->
    <div id="settings-overlay" style="display:none">
      <div id="settings-panel">
        <h3>Settings</h3>
        <label>Server URL
          <input type="text" id="setting-server-url" value="ws://localhost:3300/ws">
        </label>
        <div id="settings-actions">
          <button id="btn-settings-save">Save</button>
          <button id="btn-settings-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="lib/marked.min.js"></script>
  <script src="lib/purify.min.js"></script>
  <script src="storage.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
